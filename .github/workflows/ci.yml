name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        config: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl3-dev libssl-dev

      - name: Install deps (macOS)
        if: runner.os == 'maxOS'
        run: |
          brew update
          brew install sdl3 openssl

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install sdl3 openssl.light -y

      - name: Configure
        run: cmake -S Proteus -B Proteus/build-ci -DCMAKE_BUILD_TYPE=${{ matrix.config }} -DPROTEUS_BUILD_TESTS=ON

      - name: Build
        run: cmake --build Proteus/build-ci --config ${{ matrix.config }}

      - name: Test (non-timing)
        run: ctest --test-dir Proteus/build-ci -C ${{ matrix.config }} --output-on-failure -LE timing