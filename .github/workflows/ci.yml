name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    env:
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      SDL3_DIR: ""
      OpenSSL_DIR: ""
      nlohmann_json_DIR: ""
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        config: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ env.VCPKG_ROOT }}
          vcpkgGitCommitId: "d4424d012d982dc21529708ccc31fef27c55dcea"

      - name: Retrieve SST Data
        shell: bash
        run: |
          SST_REPO_DIR="${GITHUB_WORKSPACE}/sst-65x02"
          rm -rf "$SST_REPO_DIR"
          git clone https://github.com/SingleStepTests/65x02.git "$SST_REPO_DIR"

      - name: Select vcpkg triplet
        id: triplet
        shell: bash
        run: |
          os="${{ runner.os }}"
          arch="${{ runner.arch }}"

          if [ "$os" = "Windows" ]; then
            if [ "$arch" = "ARM64" ]; then
              echo "value=arm64-windows" >> "$GITHUB_OUTPUT"
            else
              echo "value=x64-windows" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$os" = "Linux" ]; then
            if [ "$arch" = "ARM64" ]; then
              echo "value=arm64-linux" >> "$GITHUB_OUTPUT"
            else
              echo "value=x64-linux" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$os" = "macOS" ]; then
            if [ "$arch" = "ARM64" ]; then
              echo "value=arm64-osx" >> "$GITHUB_OUTPUT"
            else
              echo "value=x64-osx" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Unsupported runner.os='$os' runner.arch='$arch'" >&2
            exit 1
          fi

          echo "Selected triplet: $(cat "$GITHUB_OUTPUT")"

      - name: Cache vcpkg artifacts
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-bincache
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
            ${{ env.VCPKG_ROOT }}/buildtrees
          key: vcpkg-${{ runner.os }}-${{ steps.triplet.outputs.value }}-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json', '.github/workflows/ci.yml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ steps.triplet.outputs.value }}-

      - name: Install dependencies (vcpkg)
        shell: bash
        run: |
          vcpkg install \
            sdl3:${{ steps.triplet.outputs.value }} \
            openssl:${{ steps.triplet.outputs.value }} \
            nlohmann-json:${{ steps.triplet.outputs.value }}

      - name: Diagnostics (pre-configure)
        shell: bash
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          echo "triplet=${{ steps.triplet.outputs.value }}"
          echo "VCPKG_ROOT=${VCPKG_ROOT}"
          echo "SSTROOT=${GITHUB_WORKSPACE}/sst-65x02/nes6502/v1"
          cmake --version
          vcpkg version

      - name: Configure
        run: >
          rm -rf build-ci
          cmake -S . -B build-ci
          -DPROTEUS_BUILD_TESTS=ON
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ steps.triplet.outputs.value }}
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
          -DSSTROOT=${{ github.workspace }}/sst-65x02/nes6502/v1

      - name: Verify CMake cache contract
        shell: bash
        run: |
          test -f build-ci/CMakeCache.txt
          grep -E "^CMAKE_TOOLCHAIN_FILE:FILEPATH=${VCPKG_ROOT//\//\\/}\\/scripts\\/buildsystems\\/vcpkg\\.cmake$" build-ci/CMakeCache.txt
          grep -E "^VCPKG_TARGET_TRIPLET:STRING=${{ steps.triplet.outputs.value }}$" build-ci/CMakeCache.txt
          grep -E "^VCPKG_INSTALLED_DIR:PATH=" build-ci/CMakeCache.txt
          grep -E "^SSTROOT:PATH=" build-ci/CMakeCache.txt || grep -E "^SSTROOT:STRING=" build-ci/CMakeCache.txt

      - name: Build
        run: cmake --build build-ci --config ${{ matrix.config }}

      - name: Test (non-timing)
        run: ctest --test-dir build-ci -C ${{ matrix.config }} --output-on-failure -LE timing