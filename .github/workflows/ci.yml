name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        config: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "d4424d012d982dc21529708ccc31fef27c55dcea"

      - name: Select vcpkg triplet
        id: triplet
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) echo "value=x64-windows" >> "$GITHUB_OUTPUT" ;;
            Linux)   echo "value=x64-linux"   >> "$GITHUB_OUTPUT" ;;
            macOS)   echo "value=x64-osx"     >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Install dependencies (vcpkg)
        shell: bash
        run: |
          vcpkg install \
            sdl3:${{ steps.triplet.outputs.value }} \
            sdl3-ttf:${{ steps.triplet.outputs.value }} \
            openssl:${{ steps.triplet.outputs.value }} \
            nlohmann-json:${{ steps.triplet.outputs.value }}

      - name: Configure
        run: >
          cmake -S Proteus -B Proteus/build-ci
          -DPROTEUS_BUILD_TESTS=ON
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ steps.triplet.outputs.value }}
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}

      - name: Build
        run: cmake --build Proteus/build-ci --config ${{ matrix.config }}

      - name: Test (non-timing)
        run: ctest --test-dir Proteus/build-ci -C ${{ matrix.config }} --output-on-failure -LE timing