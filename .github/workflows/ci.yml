name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '**/CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci.yml'
      - 'Proteus/src/tests/**'
      - 'ProteusNES/src/tests/**'
      - 'ProteusGBA/src/tests/**'
  push:
    branches: [ main ]
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '**/CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci.yml'
      - 'Proteus/src/tests/**'
      - 'ProteusNES/src/tests/**'
      - 'ProteusGBA/src/tests/**'
  workflow_dispatch:

jobs:
  build-and-test:
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
        platform:
          - runner: windows-2025
            triplet: x64-windows
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.6/LLVM-22.1.6-win64.exe
            cc: clang-cl.exe
            cxx: clang-cl.exe
          - runner: ubuntu-24.04
            triplet: x64-linux
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.6/LLVM-22.1.6-Linux-X64.tar.xz
            cc: clang
            cxx: clang++
          - runner: macos-15
            triplet: arm64-osx
            llvm_url: https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.6/LLVM-22.1.6-macOS-ARM64.tar.xz
            cc: clang
            cxx: clang++

    runs-on: ${{ matrix.platform.runner }}

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
      
      - name: Setup Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "22.1.6"
          force-url: ${{ matrix.platform.llvm_url }}
          directory: ${{ runner.temp }}/llvm

      - name: Export compiler paths
        shell: bash
        run: |
          set -euo pipefail
          echo "CMAKE_C_COMPILER=${LLVM_PATH}/bin/${{ matrix.platform.cc }}" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER=${LLVM_PATH}/bin/${{ matrix.platform.cxx }}" >> "$GITHUB_ENV"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ env.VCPKG_ROOT }}
          vcpkgGitCommitId: d4424d012d982dc21529708ccc31fef27c55dcea

      - name: Cache vcpkg artifacts
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-bincache
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
            ${{ env.VCPKG_ROOT }}/buildtrees
          key: vcpkg-${{ matrix.platform.runner }}-${{ matrix.platform.triplet }}-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json', '.github/workflows/ci.yml') }}
          restore-keys: |
            vcpkg-${{ matrix.platform.runner }}-${{ matrix.platform.triplet }}-

      - name: Install dependencies (vcpkg)
        shell: bash
        run: |
          set -euo pipefail
          vcpkg install \
            sdl3:${{ matrix.platform.triplet }} \
            openssl:${{ matrix.platform.triplet }} \
            nlohmann-json:${{ matrix.platform.triplet }}

      - name: Retrieve SST Data
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/SingleStepTests/65x02.git "${GITHUB_WORKSPACE}/sst-65x02"

      - name: Get test ROMs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/roms"
          curl -fL --retry 3 --retry-all-errors \
            https://raw.githubusercontent.com/christopherpow/nes-test-roms/master/blargg_nes_cpu_test5/cpu.nes \
            -o "${GITHUB_WORKSPACE}/roms/cpu.nes"
          curl -fL --retry 3 --retry-all-errors \
            https://raw.githubusercontent.com/christopherpow/nes-test-roms/master/volume_tests/volumes.nes \
            -o "${GITHUB_WORKSPACE}/roms/volumes.nes"
          curl -fL --retry 3 --retry-all-errors \
            https://raw.githubusercontent.com/christopherpow/nes-test-roms/master/blargg_litewall/litewall2.nes \
            -o "${GITHUB_WORKSPACE}/roms/litewall2.nes"

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build-ci
          cmake -S . -B build-ci \
            -G "Ninja Multi-Config" \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_C_COMPILER="${CMAKE_C_COMPILER}" \
            -DCMAKE_CXX_COMPILER="${CMAKE_CXX_COMPILER}" \
            -DVCPKG_TARGET_TRIPLET="${{ matrix.platform.triplet }}" \
            -DPROTEUS_BUILD_TESTS=ON \
            -DSSTROOT="${GITHUB_WORKSPACE}/sst-65x02/nes6502/v1" \
            -DNES_DET_CPU="${GITHUB_WORKSPACE}/roms/cpu.nes" \
            -DNES_DET_FRAME="${GITHUB_WORKSPACE}/roms/litewall2.nes" \
            -DNES_DET_AUDIO="${GITHUB_WORKSPACE}/roms/volumes.nes"

      - name: Build
        run: cmake --build build-ci --config ${{ matrix.config }}

      - name: Test
        run: ctest --test-dir build-ci -C ${{ matrix.config }} --output-on-failure -LE timing