name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '**/CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci.yml'
      - 'Proteus/src/tests/**'
      - 'ProteusNES/src/tests/**'
      - 'ProteusGBA/src/tests/**'
  push:
    branches: [ main ]
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.hpp'
      - '**/CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/ci.yml'
      - 'Proteus/src/tests/**'
      - 'ProteusNES/src/tests/**'
      - 'ProteusGBA/src/tests/**'
  workflow_dispatch:

jobs:
  build-and-test:
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    env:
      LLVM_PATH: ""
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      SDL3_DIR: ""
      OpenSSL_DIR: ""
      nlohmann_json_DIR: ""
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        config: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      # TODO: verify that this does in fact put the path into the environment
      - name: Setup Clang
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "22.1.6"
          directory: ${{ env.LLVM_PATH }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ env.VCPKG_ROOT }}
          vcpkgGitCommitId: "d4424d012d982dc21529708ccc31fef27c55dcea"

      - name: Retrieve SST Data
        shell: bash
        run: |
          SST_REPO_DIR="${GITHUB_WORKSPACE}/sst-65x02"
          rm -rf "$SST_REPO_DIR"
          git clone https://github.com/SingleStepTests/65x02.git "$SST_REPO_DIR"

      - name: Select vcpkg triplet
        id: triplet
        shell: bash
        run: |
          os="${{ runner.os }}"
          arch="${{ runner.arch }}"

          if [ "$os" = "Windows" ]; then
            if [ "$arch" = "ARM64" ]; then
              echo "value=arm64-windows" >> "$GITHUB_OUTPUT"
            else
              echo "value=x64-windows" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$os" = "Linux" ]; then
            if [ "$arch" = "ARM64" ]; then
              echo "value=arm64-linux" >> "$GITHUB_OUTPUT"
            else
              echo "value=x64-linux" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$os" = "macOS" ]; then
            if [ "$arch" = "ARM64" ]; then
              echo "value=arm64-osx" >> "$GITHUB_OUTPUT"
            else
              echo "value=x64-osx" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Unsupported runner.os='$os' runner.arch='$arch'" >&2
            exit 1
          fi

          echo "Selected triplet: $(cat "$GITHUB_OUTPUT")"

      - name: Cache vcpkg artifacts
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-bincache
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
            ${{ env.VCPKG_ROOT }}/buildtrees
          key: vcpkg-${{ runner.os }}-${{ steps.triplet.outputs.value }}-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json', '.github/workflows/ci.yml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ steps.triplet.outputs.value }}-

      - name: Install dependencies (vcpkg)
        shell: bash
        run: |
          vcpkg install \
            sdl3:${{ steps.triplet.outputs.value }} \
            openssl:${{ steps.triplet.outputs.value }} \
            nlohmann-json:${{ steps.triplet.outputs.value }}

      - name: Get Test ROM(s)
        shell: bash
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/roms"
          curl -fL "https://raw.githubusercontent.com/christopherpow/nes-test-roms/master/blargg_nes_cpu_test5/cpu.nes" \
            -o ${GITHUB_WORKSPACE}/roms/cpu.nes
          curl -fL "https://raw.githubusercontent.com/christopherpow/nes-test-roms/master/volume_tests/volumes.nes" \
            -o ${GITHUB_WORKSPACE}/roms/volumes.nes
          curl -fL "https://raw.githubusercontent.com/christopherpow/nes-test-roms/master/blargg_litewall/litewall2.nes" \
            -o ${GITHUB_WORKSPACE}/roms/litewall2.nes

      - name: Configure
        shell: bash
        run: |
          rm -rf build-ci
          cmake -S . -B build-ci \
          -DPROTEUS_BUILD_TESTS=ON \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=${{ steps.triplet.outputs.value }} \
          -DCMAKE_C_COMPILER=${{ env.LLVM_PATH }} \
          -DCMAKE_CXX_COMPILER=${{ env.LLVM_PATH }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
          -DSSTROOT=${{ github.workspace }}/sst-65x02/nes6502/v1 \
          -DNES_DET_CPU=${{ github.workspace }}/roms/cpu.nes \
          -DNES_DET_FRAME=${{ github.workspace }}/roms/litewall2.nes \
          -DNES_DET_AUDIO=${{ github.workspace }}/roms/volumes.nes

      - name: Build
        run: cmake --build build-ci --config ${{ matrix.config }}

      - name: Test (non-timing)
        shell: bash
        run: |
          ctest --test-dir build-ci -C ${{ matrix.config }} --output-on-failure -L plugin
          ctest --test-dir build-ci -C ${{ matrix.config }} --output-on-failure -L emulator:nes -L type:sst -L kind:cpu -j
          ctest --test-dir build-ci -C ${{ matrix.config }} --output-on-failure -L emulator:nes -L type:determinism