name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'Proteus/src/**'
      - 'ProteusNES/src/**'
      - 'ProteusGBA/src/**'
      - '**/CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/FrontendCI.yml'
      - '.github/scripts/Run-FrontendCI.ps1'
  pull_request:
    branches: [ main ]
    paths:
      - 'Proteus/src/**'
      - 'ProteusNES/src/**'
      - 'ProteusGBA/src/**'
      - '**/CMakeLists.txt'
      - 'CMakePresets.json'
      - '.github/workflows/FrontendCI.yml'
      - '.github/scripts/Run-FrontendCI.ps1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        config: [Debug, Release]

    runs-on: ${{ matrix.os }}

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.6'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ env.VCPKG_ROOT }}
          vcpkgGitCommitId: d4424d012d982dc21529708ccc31fef27c55dcea

      - name: Cache vcpkg artifacts
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.vcpkg-bincache
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
            ${{ env.VCPKG_ROOT }}/buildtrees
          key: vcpkg-${{ runner.os }}-${{ matrix.config }}-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json', '.github/workflows/FrontendCI.yml', '.github/scripts/Run-FrontendCI.ps1') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.config }}-
            vcpkg-${{ runner.os }}-

      - name: Run Frontend CI Script
        shell: pwsh
        run: ./.github/scripts/RunFrontendCI.ps1 -Config '${{ matrix.config }}'